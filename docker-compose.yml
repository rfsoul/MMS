version: '3.9'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: mms-timescaledb
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "7654:5432"
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
      - ./analytics/timescaledb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 20

  analytics-engine:
    build: ./analytics/engine
    container_name: mms-analytics-engine
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/analytics
      ANALYTICS_POLL_SECONDS: 5
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  analytics-portal:
    build: ./analytics/portal
    container_name: mms-analytics-portal
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/analytics
    depends_on:
      timescaledb:
        condition: service_healthy
      analytics-engine:
        condition: service_started
    ports:
      - "7777:7777"
    restart: unless-stopped

volumes:
  analytics_db_data:
