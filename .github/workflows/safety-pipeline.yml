name: Safety Pipeline

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

jobs:
  safety-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run safety check
        run: ./scripts/safety-check.sh
